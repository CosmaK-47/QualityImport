backend:
  name: github
  repo: CosmaK-47/QualityImport
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: public/uploads/products
public_folder: /uploads/products

collections:
  - name: inventory
    label: Central Inventory
    files:
      - name: products
        label: Products — Website + Telegram
        file: content/inventory.json
        format: json
        fields:
          - { label: Schema version, name: version, widget: number, value_type: int, min: 1 }
          - { label: Updated at, name: updatedAt, widget: datetime }
          - label: Products
            name: products
            widget: list
            summary: "{{fields.sku}} · {{fields.website.name}}"
            fields:
              - { label: Product ID, name: id, widget: string, hint: "Stable lowercase ID; do not change after publishing." }
              - { label: SKU, name: sku, widget: string }
              - label: Product image
                name: image
                widget: image
                required: false
                hint: "Used by both the website and Telegram. Recommended: square or 4:5 JPG/WebP."
              - label: Product gallery
                name: gallery
                widget: list
                required: false
                hint: "Additional product photos shown in the website detail view."
                field: { label: Image, name: image, widget: image }
              - label: Product video
                name: video
                widget: file
                required: false
                media_library:
                  config:
                    multiple: false
              - label: 360° product frames
                name: spin360
                widget: list
                required: false
                hint: "Upload the rotation images in order around the product. 24–36 equal-size frames are recommended."
                field: { label: Frame, name: frame, widget: image }
              - label: Category
                name: category
                widget: select
                options: [outerwear, tops, bottoms, shoes]
              - { label: Price, name: price, widget: number, value_type: int, min: 0 }
              - { label: Currency, name: currency, widget: select, options: [MDL], default: MDL }
              - label: Availability
                name: availability
                widget: select
                options: [stock, preorder]
              - { label: Stock quantity, name: stockQuantity, widget: number, value_type: int, min: 0 }
              - label: Artwork type
                name: art
                widget: select
                options: [jacket, trousers, shoe, knit, set, vest]
              - label: Artwork tone
                name: tone
                widget: select
                options: [graphite, silver, chalk]
              - label: Website
                name: website
                widget: object
                collapsed: false
                fields:
                  - { label: Show on website, name: enabled, widget: boolean, default: true }
                  - { label: Website name, name: name, widget: string }
                  - { label: Website description, name: description, widget: text }
                  - { label: Full product details, name: details, widget: markdown, required: false }
                  - { label: Materials and care, name: materials, widget: text, required: false }
                  - { label: Available sizes, name: sizes, widget: string, required: false, hint: "Example: XS, S, M, L" }
              - label: Telegram
                name: telegram
                widget: object
                collapsed: false
                fields:
                  - { label: Show in Telegram, name: enabled, widget: boolean, default: true }
                  - { label: Telegram name, name: name, widget: string }
                  - { label: Telegram message, name: message, widget: text }
